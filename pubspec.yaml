name: project_phoenix
description: >
  Offline-first German learning application for professional readiness.
  Transforms complete beginners into confident German speakers capable
  of working in customer service and call centers.
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^14.8.1

  # Database
  sqflite_common_ffi: ^2.3.4+4
  sqflite: ^2.4.2
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.0
  path_provider: ^2.1.5

  # Audio
  just_audio: ^0.9.42
  record: ^5.2.0

  # Functional Programming
  dartz: ^0.10.1

  # UI Enhancement
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.14
  injectable_generator: ^2.7.0

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/missions/mission_zero/
    - assets/audio/ui/
    - assets/databases/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
          weight: 400
