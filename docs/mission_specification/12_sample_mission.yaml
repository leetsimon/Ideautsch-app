# ─────────────────────────────────────────────────────────────────────────────
# SECTION 10: PRONUNCIATION COACHING
# ─────────────────────────────────────────────────────────────────────────────
pronunciation_coaching:
  focus_sounds:
    - sound_id: "ch_ich_laut"
      ipa: "/ç/"
      german_example: "ich"
      occurrence_in_mission: "'ich' in 'wie kann ich Ihnen helfen?'"
      bridge:
        language: "none"
        explanation_en: >
          The /ç/ sound doesn't exist in Arabic, French, or English. But you 
          can learn it easily: whisper the word 'hee' very loudly. Feel the 
          friction at the FRONT of the roof of your mouth? That friction IS 
          the German 'ch' in 'ich'. It's different from Arabic خ — that's 
          further back (and that's the OTHER German 'ch' in 'Bach').
        explanation_darija: >
          صوت /ç/ ما كاينش ف العربية ولا الفرنسية ولا الانجليزية. ولكن 
          تقدر تعلمو بسهولة: قول 'هييي' بصوت عالي بزاف. حس بالاحتكاك ف 
          قدام سقف الفم؟ هداك الاحتكاك هو 'ch' الألمانية ف 'ich'. مختلف 
          على خ ديالنا — هديك من لور (وهديك هي 'ch' الأخرى الألمانية ف 'Bach').
      minimal_pairs:
        - word_a: "ich (/ɪç/)"
          word_b: "isch (/ɪʃ/ — dialect error)"
          meaning: "ich = I (correct) vs. isch = dialectal (unprofessional)"
          audio_a: "audio/pronunciation/ich_correct.opus"
          audio_b: "audio/pronunciation/ich_incorrect_sch.opus"
      drill_words:
        - word: "ich"
          context: "wie kann ICH Ihnen helfen?"
          audio: "audio/pronunciation/drill_ich.opus"
        - word: "nicht"
          context: "Das ist leider NICHT möglich."
          audio: "audio/pronunciation/drill_nicht.opus"
        - word: "natürlich"
          context: "NATÜRLICH helfe ich Ihnen."
          audio: "audio/pronunciation/drill_natuerlich.opus"
      common_errors_for_moroccan_learners:
        - error: "Replacing /ç/ with /ʃ/ — saying 'ish' instead of 'ich'"
          source: "No /ç/ in Arabic phonological system; nearest is /ʃ/"
          frequency: "Very common"
          correction: "Front the friction point: /ʃ/ is blade of tongue; /ç/ is body of tongue against hard palate"
        - error: "Replacing /ç/ with /x/ (Arabic خ) — saying 'ach' for 'ich'"
          source: "Overgeneralization: Arabic speaker knows خ is similar to German 'ch'"
          frequency: "Common"
          correction: "/x/ is correct after a, o, u (Bach, noch). /ç/ is correct after i, e, ü, ö, ei, eu (ich, echt, Bücher)."

    - sound_id: "w_as_v"
      ipa: "/v/"
      german_example: "wie"
      occurrence_in_mission: "'Wie' in 'Wie kann ich Ihnen helfen?'"
      bridge:
        language: "french"
        explanation_en: >
          German 'w' is pronounced like French 'v' in 'vous' or 'vin'. 
          NOT like English 'w' in 'water'. If you speak French, just use 
          your French 'v' whenever you see German 'w'.
        explanation_darija: >
          'w' الألمانية كتنطق بحال 'v' الفرنسية ف 'vous' أو 'vin'. 
          ماشي بحال 'w' الانجليزية ف 'water'. إلو كتهدر الفرنسية، غير 
          خدم 'v' الفرنسية ديالك فين ما شفتي 'w' ألمانية.
      drill_words:
        - word: "wie"
          context: "WIE kann ich Ihnen helfen?"
          audio: "audio/pronunciation/drill_wie.opus"
        - word: "willkommen"
          context: "Herzlich WILLKOMMEN bei TeleService."
          audio: "audio/pronunciation/drill_willkommen.opus"
      common_errors_for_moroccan_learners:
        - error: "Using English /w/ (lip-rounding without teeth contact)"
          source: "English interference"
          frequency: "Moderate"
          correction: "Upper teeth touch lower lip (like French 'v'). Voiced labiodental fricative."

  intonation_pattern:
    pattern_id: "service_greeting_professional"
    description: >
      The four-part call center greeting has a specific professional contour:
      neutral-confident on greeting, slight rise on company name, level on 
      personal name, clear rise on the final question.
    contour_notation: "→ Guten Tag → TeleService GmbH ↗ → mein Name ist Youssef → wie kann ich Ihnen helfen? ↗↗"
    example_audio: "audio/pronunciation/greeting_intonation_model.opus"
    counter_example_audio: "audio/pronunciation/greeting_intonation_flat.opus"
    explanation_en: >
      Two key points: 1) Company name gets a slight rise (signals: I'm presenting 
      my company). 2) 'helfen?' gets a clear rise (signals: I'm asking a question, 
      I'm open, I'm ready). A flat intonation sounds bored or robotic.
    explanation_darija: >
      نقطتين مهمين: 1) اسم الشركة كيطلع شوية (كيعني: كنقدم الشركة ديالي). 
      2) 'helfen?' كيطلع بوضوح (كيعني: سؤال، أنا مفتوح، أنا جاهز). 
      إلو الصوت مسطح كيبان بحال ملي كتكون ملقي.


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 11: COMMON MISTAKES
# ─────────────────────────────────────────────────────────────────────────────
common_mistakes:
  - id: "err_001_register"
    type: "register"
    mistake_de: "Hallo, was brauchst du?"
    correction_de: "Guten Tag, wie kann ich Ihnen helfen?"
    explanation_en: >
      'Hallo' alone is too casual for a professional phone answer. 'du' is 
      informal — customers are ALWAYS 'Sie'. The full four-part formula is 
      required: greeting + company + name + offer.
    explanation_darija: >
      'Hallo' وحدها casual بزاف للرد على التيليفون المهني. 'du' informal — 
      الزبائن ديما 'Sie'. الصيغة الكاملة بأربع أجزاء ضرورية.
    severity: "high"
    prevention_tip: "When on a business phone: Guten Tag + Sie. Non-negotiable."
    audio_incorrect: "audio/mistakes/m01_001_hallo_du.opus"
    audio_correct: "audio/missions/m01_001_d/dlg_t2_native.opus"

  - id: "err_001_identification"
    type: "vocabulary"
    mistake_de: "Ich bin Youssef."
    correction_de: "Mein Name ist Youssef."
    explanation_en: >
      Both are grammatically correct German. But 'Mein Name ist...' is the 
      STANDARD call center formula. It sounds more professional, more 
      structured, more like you've been trained. 'Ich bin...' is fine for 
      casual introductions — not for answering a business phone.
    explanation_darija: >
      الجوج صحيحين grammaticalement. ولكن 'Mein Name ist...' هي الصيغة 
      المعيارية ف call center. كتبان أكثر professionnelle، أكثر منظمة. 
      'Ich bin...' مزيانة للتعارف العادي — ماشي للرد على تيليفون مهني.
    severity: "medium"
    prevention_tip: "On the phone: always 'Mein Name ist...' — it's the professional formula."

  - id: "err_001_dir_ihnen"
    type: "register"
    mistake_de: "Wie kann ich dir helfen?"
    correction_de: "Wie kann ich Ihnen helfen?"
    explanation_en: >
      'dir' = informal (du-form). 'Ihnen' = formal (Sie-form). In German 
      customer service, you ALWAYS use Sie/Ihnen with customers. Even if the 
      customer uses 'du' with you. This rule is absolute and can result in 
      disciplinary action if violated at work.
    explanation_darija: >
      'dir' = informal (شكل du). 'Ihnen' = formal (شكل Sie). ف customer 
      service الألماني، ديما كتستعمل Sie/Ihnen مع الزبائن. حتى إلو الزبون 
      استعمل 'du' معاك. هاد القاعدة مطلقة وممكن تأدي لعقوبة ف الخدمة.
    severity: "critical"
    prevention_tip: "One rule: With customers → Sie/Ihnen. Always. No exceptions."

  - id: "err_001_v_pronunciation"
    type: "pronunciation"
    mistake_description: "Pronouncing 'Vielen' with English /v/ instead of German /f/"
    explanation_en: >
      German 'v' in German-origin words is pronounced /f/. 'Vielen Dank' = 
      'FEE-len Dank', not 'VEE-len Dank'. This catches many learners because 
      English 'v' = /v/, but German 'v' = /f/ (in most native German words).
    explanation_darija: >
      'v' الألمانية ف الكلمات الألمانية الأصلية كتنطق /f/. 'Vielen Dank' = 
      'فيي-لن دانك'، ماشي 'ڤيي-لن دانك'. هادشي كيخطّا بزاف ديال المتعلمين 
      حيت 'v' الانجليزية = /v/، ولكن 'v' الألمانية = /f/.
    severity: "medium"
    audio_incorrect: "audio/mistakes/vielen_with_v.opus"
    audio_correct: "audio/missions/m01_001_d/vocab_vielen_dank_native.opus"

  - id: "err_001_silence"
    type: "cultural"
    mistake_description: "Leaving silence (>5 seconds) while checking the system"
    explanation_en: >
      In German call centers, silence on the line makes the customer think 
      you hung up or forgot them. ALWAYS fill silence with action narration: 
      'Einen Moment bitte, ich schaue nach...' or 'Ich prüfe das gerade für Sie...'
    explanation_darija: >
      ف call centers الألمانية، الصمت ف الخط كيخلي الزبون يظن بلي 
      طفيتي عليه أو نسيتيه. ديما عمّر الصمت بسرد العمل: 
      'Einen Moment bitte, ich schaue nach...' أو 'Ich prüfe das gerade für Sie...'
    severity: "high"
    prevention_tip: "If you need time: say what you're doing. Fill the silence."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 12: CULTURAL NOTES
# ─────────────────────────────────────────────────────────────────────────────
cultural_notes:
  - id: "culture_001_greeting_formula"
    trigger: "before_exercise_01"
    type: "workplace_norm"
    title_en: "The German Call Center Greeting — It's Not Optional"
    content_en: >
      In German call centers, the phone greeting is a FIXED FORMULA that 
      every employee must follow. It's not your choice to say just "Hello." 
      The formula: [Greeting] + [Company] + [Your name] + [How can I help?] 
      is drilled into every new hire on Day 1. Supervisors listen to calls 
      and will correct you if you deviate from it.
    content_darija: >
      ف call centers الألمانية، التحية ف التيليفون هي صيغة ثابتة 
      كل موظف خاصو يتبعها. ماشي اختيارك تقول غير "Hallo." 
      الصيغة: [تحية] + [شركة] + [سميتك] + [كيفاش نعاونك؟] 
      كتدرّب لكل موظف جديد ف اليوم الأول. المسؤولين كيسمعو المكالمات 
      وغيصلحوك إلو ما تبعتيهاش.
    importance: "critical"
    compare_darija: >
      In Morocco, you might answer: "Allo? Na3am?" — one or two words, 
      informal, quick. In German business: FULL FORMULA. Every time. 
      The difference: in Germany, the greeting IS your first quality metric.

  - id: "culture_001_sie_always"
    trigger: "before_exercise_08"
    type: "workplace_norm"
    title_en: "Sie with Customers — Always, Without Exception"
    content_en: >
      In customer service: you ALWAYS use 'Sie' (formal you) with customers. 
      Never 'du'. Even if the customer uses 'du' with you — you respond 
      with 'Sie'. Even if they're young. Even if they're friendly. 
      Using 'du' with a customer can result in a warning from your supervisor.
    content_darija: >
      ف customer service: ديما كتستعمل 'Sie' (أنت الرسمية) مع الزبائن. 
      ما عمرك 'du'. حتى إلو الزبون استعمل 'du' معاك — أنت كتجاوب ب 'Sie'. 
      حتى إلو صغير ف العمر. حتى إلو ودود. استعمال 'du' مع زبون يمكن 
      يجيبلك إنذار من المسؤول ديالك.
    importance: "critical"
    compare_darija: >
      Like French 'vous' vs 'tu' in formal settings — but even stricter. 
      In Darija we naturally switch to informal quickly. In German customer 
      service: NEVER switch. The formal register is permanent.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 13: SMART REVIEW
# ─────────────────────────────────────────────────────────────────────────────
smart_review:
  new_srs_items:
    - item_id: "v_guten_tag"
      item_type: "vocabulary"
      initial_interval_hours: 12
      initial_ease_factor: 2.5
      review_exercise_types: ["repeat", "conversation", "time_pressure"]
      context_variations:
        - "Guten Tag, hier ist die Serviceabteilung."
        - "Guten Tag, Sie sprechen mit Youssef Ben-Ali."
        - "Guten Tag, wie kann ich Ihnen weiterhelfen?"
        - "Guten Tag, herzlich willkommen bei TeleService."
    - item_id: "v_mein_name_ist"
      item_type: "phrase"
      initial_interval_hours: 12
      initial_ease_factor: 2.5
      review_exercise_types: ["repeat", "time_pressure", "conversation"]
      context_variations:
        - "Mein Name ist Youssef, wie kann ich helfen?"
        - "Guten Tag, mein Name ist Youssef Ben-Ali."
        - "Mein Name ist Youssef, ich bin Ihr Ansprechpartner."
        - "Willkommen bei TeleService, mein Name ist Youssef."
    - item_id: "v_wie_kann_ich_ihnen_helfen"
      item_type: "phrase"
      initial_interval_hours: 12
      initial_ease_factor: 2.5
      review_exercise_types: ["repeat", "conversation", "time_pressure"]
      context_variations:
        - "Wie kann ich Ihnen behilflich sein?"
        - "Was kann ich für Sie tun?"
        - "Wie kann ich Ihnen weiterhelfen?"
        - "Womit kann ich Ihnen heute dienen?"
    - item_id: "v_selbstverstaendlich"
      item_type: "vocabulary"
      initial_interval_hours: 24
      initial_ease_factor: 2.5
      review_exercise_types: ["repeat", "conversation"]
      context_variations:
        - "Selbstverständlich, das mache ich sofort."
        - "Selbstverständlich helfe ich Ihnen gerne."
        - "Selbstverständlich, Frau Schmidt. Einen Moment bitte."
        - "Selbstverständlich. Können Sie mir Ihre Kundennummer geben?"
    - item_id: "v_einen_moment_bitte"
      item_type: "phrase"
      initial_interval_hours: 12
      initial_ease_factor: 2.5
      review_exercise_types: ["repeat", "conversation", "time_pressure"]
      context_variations:
        - "Einen Moment bitte, ich prüfe das für Sie."
        - "Einen kleinen Moment, ich verbinde Sie."
        - "Einen Moment, ich schaue sofort in unserem System nach."
        - "Einen Moment bitte, ich notiere mir Ihre Bestellnummer."

  embedded_review_items: []

  review_triggers:
    - condition: "greeting_phrase_score_below_0.50"
      action: "schedule_extra_review_within_8h"
      description: "If greeting is weak, prioritize immediate reinforcement"
    - condition: "pronunciation_score_below_0.45_on_ich_sound"
      action: "add_to_pronunciation_lab_queue"
      description: "Flag /ç/ for dedicated pronunciation practice"
    - condition: "dialogue_overall_score_below_0.40"
      action: "offer_recovery_mission_m01_001_r"
      description: "If the full call was too challenging, offer gentler approach"
    - condition: "response_latency_above_8s_on_greeting"
      action: "add_time_pressure_review_type"
      description: "If greeting retrieval is slow, train speed"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 14: CONFIDENCE SCORING
# ─────────────────────────────────────────────────────────────────────────────
confidence_scoring:
  dimensions:
    - id: "communicative_success"
      weight: 0.40
      description: "Were all required communication goals achieved? (greeting, identification, offer, information request, thanks)"
      measurement: "required_keyword_match_across_all_production_turns"
    - id: "linguistic_accuracy"
      weight: 0.25
      description: "Were phrases produced with correct structure and vocabulary?"
      measurement: "total_keywords_matched / total_keywords_expected"
    - id: "pronunciation_quality"
      weight: 0.20
      description: "Would a German native speaker understand without asking to repeat?"
      measurement: "average_vosk_confidence_across_production_turns"
    - id: "response_speed"
      weight: 0.05
      description: "How quickly did the learner begin speaking? (Disabled for Module 1 — always scores 1.0)"
      measurement: "always_1.0_for_module_1"
    - id: "professional_register"
      weight: 0.10
      description: "Was formal register maintained? (Sie/Ihnen, Guten Tag, professional formulas)"
      measurement: "formal_markers_found / expected_formal_markers"
  thresholds:
    accomplished: 0.80
    completed: 0.60
    advanced: 0.40
    attempted: 0.0
  career_readiness_contribution:
    domain: "phone_communication"
    max_contribution_percent: 3.0
    formula: "mission_overall_score × 3.0"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 15: SUCCESS CRITERIA
# ─────────────────────────────────────────────────────────────────────────────
success_criteria:
  primary:
    description: "Produce a recognizable professional phone greeting containing greeting + name + offer to help"
    test: "Turn 2 evaluation: 'Guten Tag' (required, matched) + 'wie kann ich' (required, matched) + 'helfen' (required, matched)"
    minimum_score: 0.50
  secondary:
    - description: "Use formal register throughout (Sie/Ihnen, no du/dir detected)"
      test: "Zero informal markers detected in any production turn transcription"
    - description: "Complete all three agent turns in the dialogue (turns 2, 4, 6)"
      test: "All three production turns have recorded audio responses"
    - description: "Pronunciation intelligible on the greeting phrase (turn 2)"
      test: "Turn 2 pronunciation_quality dimension ≥ 0.50"
    - description: "Ask for the order number in turn 4"
      test: "Turn 4 contains 'Bestellnummer' or equivalent"
  minimum_for_progression:
    description: "Learner completed all 10 exercises (responses recorded for each speaking exercise)"
    test: "All exercise IDs in mission marked as attempted with at least one response"

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 16: CAREER TRANSFER
# ─────────────────────────────────────────────────────────────────────────────
career_transfer:
  statement_en: >
    This exact greeting formula — Guten Tag + company name + your name + 
    "Wie kann ich Ihnen helfen?" — is used in 100% of German call centers, 
    reception desks, and customer helpdesks. You will say this sentence 
    50–100 times on your first day of work. Every day after: 30–80 times. 
    By making it automatic now, you arrive at your first shift performing 
    at the level of a trained employee — at least for the first 5 seconds 
    of every call. Those 5 seconds determine the customer's first impression.
  statement_darija: >
    هاد الصيغة بالضبط — Guten Tag + اسم الشركة + سميتك + "Wie kann ich 
    Ihnen helfen?" — كتستعمل ف 100% ديال call centers والاستقبال ف ألمانيا. 
    غادي تقولها 50–100 مرة ف اليوم الأول ديال الخدمة. كل يوم بعد: 30–80 مرة. 
    ملي كتخليها automatique دابا، كتوصل لأول يوم خدمة عندك niveau ديال 
    موظف متدرب — على الأقل ف أول 5 ثواني ديال كل مكالمة. وهاد 5 ثواني 
    هي اللي كتحدد الانطباع الأول عند الزبون.
  statement_fr: >
    Cette formule exacte — Guten Tag + nom de l'entreprise + votre nom + 
    "Wie kann ich Ihnen helfen?" — est utilisée dans 100% des centres 
    d'appels allemands. Vous la direz 50 à 100 fois le premier jour de 
    travail. En la rendant automatique maintenant, vous arrivez à votre 
    premier poste au niveau d'un employé formé.
  frequency_at_work: "50–100 times on day one; 30–80 times daily thereafter"
  domains_applied:
    - "call_center"
    - "reception_desk"
    - "customer_helpdesk"
    - "technical_support_hotline"
    - "sales_hotline"
  real_world_impact: "First 5 seconds of every customer interaction — determines their entire impression"


