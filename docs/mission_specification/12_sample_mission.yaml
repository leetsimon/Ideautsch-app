# ─────────────────────────────────────────────────────────────────────────────
# SECTION 18: ADAPTIVE DIFFICULTY RULES
# ─────────────────────────────────────────────────────────────────────────────
adaptive_difficulty:
  initial_support_level: "high"
  
  escalation_rules:
    - condition: "exercises_01_to_04_all_score_above_0.70"
      action: "switch_to_support_standard_for_exercise_08"
      description: "If warm-up and equip phase go well, reduce scaffolding for challenge"
    - condition: "exercise_05_score_above_0.75"
      action: "switch_to_support_minimal_for_exercise_09"
      description: "If full greeting recall is strong, remove support for final repeat"
    - condition: "exercise_08_dialogue_score_above_0.80"
      action: "offer_stretch_challenge"
      stretch_challenge: "Repeat the full dialogue WITHOUT any scaffolding. No text, no hints."

  de_escalation_rules:
    - condition: "exercise_02_score_below_0.40"
      action: "keep_support_high_for_all_remaining_exercises"
      description: "If basic shadowing is difficult, maintain maximum support throughout"
    - condition: "exercise_05_score_below_0.35"
      action: "split_greeting_into_two_exercises"
      description: "If full greeting is too much, break into 'first half' and 'second half'"
    - condition: "exercise_08_failed_both_attempts"
      action: "offer_recovery_mission_instead_of_retry"
      description: "If the full call was overwhelming, suggest a gentler approach tomorrow"
    - condition: "3_consecutive_exercises_below_0.40"
      action: "insert_confidence_builder"
      confidence_builder: "Quick win: repeat just 'Guten Tag' with full support. Easy success."

  session_pacing:
    if_learner_fast: "Allow natural progression. Don't slow down a confident learner."
    if_learner_steady: "Standard pacing. All exercises as designed."
    if_learner_struggling: "Add 1-2 second pauses between exercises. Reduce pace. Add encouragement."
    end_on_success_rule: >
      The LAST exercise the learner completes must always be one they can 
      succeed at. If they're struggling on exercise 9, ensure exercise 10 
      (comprehension check) is achievable. Never end a session on failure.

