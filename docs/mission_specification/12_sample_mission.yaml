# ─────────────────────────────────────────────────────────────────────────────
# SECTION 2: LEARNING OBJECTIVE
# ─────────────────────────────────────────────────────────────────────────────
learning_objective:
  statement_en: >
    After this mission, the learner can answer a professional phone call 
    in German using the complete call center greeting formula: company name, 
    personal identification, and offer to help.
  statement_darija: >
    بعد هاد المهمة، المتعلم يقدر يجاوب على مكالمة احترافية بالألمانية 
    بالصيغة الكاملة ديال call center: اسم الشركة، التعريف بالنفس، 
    وعرض المساعدة.
  statement_fr: >
    Après cette mission, l'apprenant peut répondre à un appel professionnel 
    en allemand en utilisant la formule complète : nom de l'entreprise, 
    identification personnelle et offre d'aide.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 3: REAL-WORLD SCENARIO
# ─────────────────────────────────────────────────────────────────────────────
scenario:
  setting: "Call center training desk, TeleService GmbH, Monday 9:05 AM, first day"
  character: "frau_schmidt"
  character_mood: "neutral_friendly"
  situation: >
    It's your first morning at TeleService GmbH. Your desk is clean, your 
    headset is on, your screen shows the CRM system. Frau Müller, your team 
    leader, walks past and says: "Dein erstes Gespräch kommt gleich. 
    Denk an die Begrüßungsformel. Du schaffst das." She gives you a 
    confident nod and walks to her desk. Your headset beeps. Incoming call.
    The screen shows: "Frau Schmidt — Stammkundin" (regular customer).
  stakes: >
    This is your first real customer interaction. Professional first 
    impression. The beginning of your German career.
  sensory_details:
    visual: >
      Clean desk with dual monitors. Headset with microphone. CRM screen 
      showing caller info: "Schmidt, Ingrid — Kundennr. 4721 — Stammkundin".
      Green "Answer" button pulsing.
    audio: >
      Subtle office ambiance (keyboard clicks, distant murmur). Then: 
      phone ring tone (2 rings before learner answers). After answer: 
      slight phone-line compression on customer voice.
  trigger: >
    Your headset beeps twice. The screen shows an incoming call from 
    Frau Schmidt. The green button is pulsing. Answer now.

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 4: EMOTIONAL GOAL
# ─────────────────────────────────────────────────────────────────────────────
emotional_goal:
  primary_emotion: "professional_confidence"
  entry_feeling: >
    Nervous but determined. This is the moment I've been preparing for. 
    I'm here. I'm doing this.
  exit_feeling: >
    I just had my first real conversation in German. Professionally. 
    I answered a phone. I asked for information. I thanked a customer. 
    That was me. In German.
  confidence_vector: "positive"
  vulnerability_level: "moderate"
  yasmina_emotional_support: true


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 5: YASMINA COACHING MESSAGES
# ─────────────────────────────────────────────────────────────────────────────
yasmina:
  session_greeting:
    text_darija: >
      مرحبا بيك. أنا ياسمينا. قبل 5 سنين كنت بحالك بالضبط — 
      ف كازا، كنحلم نخدم ف ألمانيا، ما كنعرف حتى كلمة بالألمانية.
      اليوم أنا Team Lead ف Düsseldorf. وغادي نعاونك توصل لنفس البلاصة.
      اليوم: أول مكالمة ديالك. بالألمانية. احترافية. جاهز؟
    text_en: >
      Welcome. I'm Yasmina. Five years ago I was exactly where you are — 
      in Casablanca, dreaming of working in Germany, not knowing a single 
      word of German. Today I'm a Team Lead in Düsseldorf. I'm going to 
      help you get to the same place. Today: your first call. In German. 
      Professional. Ready?
    voice_notes: "Warm, confident, personal. Mix of Darija and English. Slight pause before 'Ready?'"

  pre_mission_briefing:
    text_darija: >
      شوف — ف call centers الألمانية، ملي كتجاوب على التيليفون عندك صيغة واحدة.
      ديما نفس الحاجة: تحية + اسم الشركة + سميتك + 'كيفاش نقدر نعاونك'.
      هادي ماشي اختيارية. كل موظف كيقولها. 50 مرة ف النهار.
      غادي نتعلموها دابا حتى تولي عندك automatique.
    text_en: >
      Look — in German call centers, when you answer the phone there's one 
      formula. Always the same: greeting + company name + your name + 
      'How can I help you?' This isn't optional. Every employee says it. 
      50 times a day. We're going to learn it now until it's automatic.
    voice_notes: "Direct, professional, matter-of-fact. This is serious but achievable."

  mid_mission_encouragement:
    trigger: "after_exercise_04"
    text_mixed: >
      مزيان. You just said the full greeting — in German. On your first day.
      Most learners take a week to get here. You did it in 10 minutes.
      Now let's use it in a real call.
    voice_notes: "Brief. Warm. Don't over-celebrate. Move forward."

  post_mission_debrief:
    text_de_simple: >
      Gut gemacht. Dein erster Anruf. Auf Deutsch. Professionell.
    text_darija: >
      شفتي؟ هاد اللي دارتي — جاوبتي على تيليفون بالألمانية، عرفتي 
      بنفسك، سولتي الزبونة على رقم الطلب، شكرتيها. 
      هادا ماشي exercice — هادا professional German communication.
      غدا: الزبونة غتعاود تقصن. وغتكون جاهز.
    text_en: >
      See what you just did? You answered a phone in German, identified 
      yourself, asked for the order number, thanked the customer. 
      That's not an exercise — that's professional German communication.
      Tomorrow: the customer calls back. And you'll be ready.
    voice_notes: "Proud but restrained. Factual. Then forward-looking."

# ─────────────────────────────────────────────────────────────────────────────
# SECTION 6: VOCABULARY
# ─────────────────────────────────────────────────────────────────────────────
vocabulary:
  core:
    - id: "v_guten_tag"
      chunk_phrase: "Guten Tag"
      literal_meaning: "Good day"
      functional_meaning: >
        Universal professional greeting in German business. Used at any time 
        of day in formal settings. The standard opening for every customer 
        service interaction.
      translation_en: "Good day (formal greeting)"
      translation_darija: "نهاركم مبروك (رسمي — بحال Bonjour ف الخدمة)"
      translation_fr: "Bonjour (registre formel)"
      ipa: "/ˈɡuːtn̩ taːk/"
      audio_native: "audio/missions/m01_001_d/vocab_guten_tag_native.opus"
      audio_slow: "audio/missions/m01_001_d/vocab_guten_tag_slow.opus"
      part_of_speech: "greeting_phrase"
      article: null
      register: "formal"
      frequency_rank: 1
      domain: "greeting"
      cluster: "openers"
      example_in_context:
        de: "Guten Tag, TeleService GmbH, mein Name ist Youssef."
        en: "Good day, TeleService GmbH, my name is Youssef."
        darija: "نهار مبروك، تيلي سيرفيس، سميتي يوسف."
        audio: "audio/missions/m01_001_d/example_guten_tag.opus"
      phonetic_bridge:
        language: "french"
        bridge_text_en: >
          Think of 'Bonjour' — same social weight, same formality. 
          'Guten Tag' is your German 'Bonjour' for business.
        bridge_text_darija: >
          بحال 'Bonjour' — نفس الوزن الاجتماعي، نفس الرسمية. 
          'Guten Tag' هي 'Bonjour' ديالك بالألمانية ف الخدمة.
      pronunciation_guide:
        stress_pattern: "GU-ten Tag"
        key_sounds:
          - sound: "The 'u' in 'Guten' is long /uː/"
            tip_en: "Like 'oo' in 'food' but with rounded lips"
            tip_darija: "بحال 'ou' ف 'food' بالانجليزية ولكن بالشفاه مدورة"
          - sound: "Final 'g' in 'Tag' → /k/"
            tip_en: "End with /k/ sound (voiceless), not /g/"
            tip_darija: "سالي ب /k/ (بلا صوت)، ماشي /g/"
        intonation: "Slight fall on 'Tag' — it's a statement, not a question"
      common_errors:
        - error: "Guten Tak"
          explanation_en: "The 'g' becomes /k/ at word end (Auslautverhärtung), but it's a back sound /k/, never a front /t/"
          explanation_darija: "'g' كتولي /k/ ف الآخر ديال الكلمة، ولكن من لور الفم /k/، ما عمرها /t/"
          severity: "low"
        - error: "Gutn Tag (swallowing the '-en')"
          explanation_en: "In careful/professional speech, pronounce the full '-en'. In fast casual speech, reduction is normal — but learn the full form first."
          explanation_darija: "ف الكلام المهني، نطق '-en' كاملة. ف الكلام السريع العادي يمكن تقصرها — ولكن تعلم الشكل الكامل أولا."
          severity: "medium"
      srs_config:
        initial_interval_hours: 12
        initial_ease_factor: 2.5
        review_exercise_types: ["repeat", "conversation", "time_pressure"]
        context_variations:
          - "Guten Tag, hier ist die Kundenbetreuung."
          - "Guten Tag, Sie sprechen mit der Serviceabteilung."
          - "Guten Tag, wie kann ich Ihnen weiterhelfen?"
          - "Guten Tag, herzlich willkommen bei TeleService."

    - id: "v_mein_name_ist"
      chunk_phrase: "Mein Name ist..."
      literal_meaning: "My name is..."
      functional_meaning: >
        Professional self-identification on the phone. The standard call 
        center formula for giving your name. More formal than "Ich bin..."
      translation_en: "My name is..."
      translation_darija: "سميتي... (الصيغة الرسمية)"
      translation_fr: "Mon nom est... (registre professionnel)"
      ipa: "/maɪn ˈnaːmə ɪst/"
      audio_native: "audio/missions/m01_001_d/vocab_mein_name_native.opus"
      audio_slow: "audio/missions/m01_001_d/vocab_mein_name_slow.opus"
      part_of_speech: "identification_phrase"
      article: null
      register: "formal"
      frequency_rank: 3
      domain: "identification"
      cluster: "openers"
      example_in_context:
        de: "Mein Name ist Youssef Ben-Ali, ich bin Ihr Ansprechpartner."
        en: "My name is Youssef Ben-Ali, I am your contact person."
        darija: "سميتي يوسف بن علي، أنا اللي غيتكلف بيك."
        audio: "audio/missions/m01_001_d/example_mein_name.opus"
      phonetic_bridge:
        language: "english"
        bridge_text_en: >
          'Mein' rhymes with English 'mine'. 'Name' is similar to English 
          'name' but with a schwa at the end: NAH-muh.
        bridge_text_darija: >
          'Mein' كتشبه 'mine' بالانجليزية. 'Name' قريبة من الانجليزية 
          ولكن ب schwa ف الآخر: NAH-muh.
      pronunciation_guide:
        stress_pattern: "MEIN Na-me ist..."
        key_sounds:
          - sound: "'ei' in 'Mein' = /aɪ/ diphthong"
            tip_en: "Like 'my' in English. German 'ei' always = English 'eye/my'"
            tip_darija: "بحال 'my' بالانجليزية. 'ei' الألمانية ديما = صوت 'eye'"
          - sound: "'a' in 'Name' = long /aː/"
            tip_en: "Open, long 'ah' — like 'father' but longer"
            tip_darija: "فتح، طويل 'اااا' — بحال 'father' بالانجليزية ولكن أطول"
        intonation: "Neutral, slight rise before the name (anticipation)"
      common_errors:
        - error: "Ich bin Youssef (instead of Mein Name ist...)"
          explanation_en: "Both are correct German, but 'Mein Name ist...' is the STANDARD call center formula. It sounds more professional."
          explanation_darija: "الجوج صحيحين بالألمانية، ولكن 'Mein Name ist...' هي الصيغة المعيارية ف call center. كتبان أكثر professionnelle."
          severity: "medium"
      srs_config:
        initial_interval_hours: 12
        initial_ease_factor: 2.5
        review_exercise_types: ["repeat", "time_pressure", "conversation"]
        context_variations:
          - "Mein Name ist Youssef, wie kann ich helfen?"
          - "Guten Tag, mein Name ist Youssef Ben-Ali."
          - "Mein Name ist Youssef, ich kümmere mich um Ihr Anliegen."
          - "Willkommen bei TeleService, mein Name ist Youssef."

    - id: "v_wie_kann_ich_ihnen_helfen"
      chunk_phrase: "Wie kann ich Ihnen helfen?"
      literal_meaning: "How can I you(formal-dative) help?"
      functional_meaning: >
        The standard offer of assistance in German customer service. Opens 
        the interaction for the customer to state their need. Used in every 
        single call center greeting.
      translation_en: "How can I help you? (formal)"
      translation_darija: "كيفاش نقدر نعاونك؟ (رسمي)"
      translation_fr: "Comment puis-je vous aider ?"
      ipa: "/viː kan ɪç ˈiːnən ˈhɛlfn̩/"
      audio_native: "audio/missions/m01_001_d/vocab_wie_kann_ich_native.opus"
      audio_slow: "audio/missions/m01_001_d/vocab_wie_kann_ich_slow.opus"
      part_of_speech: "service_phrase"
      article: null
      register: "formal"
      frequency_rank: 2
      domain: "service_opening"
      cluster: "openers"
      example_in_context:
        de: "Guten Tag, wie kann ich Ihnen heute helfen?"
        en: "Good day, how can I help you today?"
        darija: "نهار مبروك، كيفاش نقدر نعاونك اليوم؟"
        audio: "audio/missions/m01_001_d/example_wie_kann_ich.opus"
      phonetic_bridge:
        language: "french"
        bridge_text_en: >
          Like French 'Comment puis-je vous aider?' — same formality, 
          same function. The 'w' in 'wie' is pronounced /v/ (like French 'v' 
          in 'vous').
        bridge_text_darija: >
          بحال 'Comment puis-je vous aider?' بالفرنسية — نفس الرسمية، 
          نفس الوظيفة. 'w' ف 'wie' كتنطق /v/ (بحال 'v' الفرنسية ف 'vous').
      pronunciation_guide:
        stress_pattern: "Wie KANN ich IH-nen HEL-fen?"
        key_sounds:
          - sound: "'w' = /v/"
            tip_en: "German 'w' = English/French 'v'. Not English 'w'."
            tip_darija: "'w' الألمانية = 'v' بالانجليزية/الفرنسية. ماشي 'w' الانجليزية."
          - sound: "'ch' in 'ich' = /ç/"
            tip_en: "The palatal fricative. Whisper 'hee' with friction at the front roof of your mouth."
            tip_darija: "الاحتكاك ف قدام سقف الفم. قول 'هيي' بصوت عالي — حس بالاحتكاك."
          - sound: "'Ihnen' — long /iː/ + silent 'h'"
            tip_en: "The 'h' is silent. It just makes the 'i' long: EEH-nen."
            tip_darija: "'h' ساكتة. غير كتطول 'i': إيي-نن."
          - sound: "Rising intonation on 'helfen?'"
            tip_en: "Voice goes UP at the end — it's a question."
            tip_darija: "الصوت كيطلع ف الآخر — حيت سؤال."
        intonation: "Clear rising intonation on the final word (question marker)"
      common_errors:
        - error: "Wie kann ich dir helfen?"
          explanation_en: "'dir' is informal (du-form). With customers: ALWAYS 'Ihnen' (Sie-form). This is non-negotiable in professional German."
          explanation_darija: "'dir' informal (شكل du). مع الزبائن: ديما 'Ihnen' (شكل Sie). هادا ما كيتناقشش ف الألمانية المهنية."
          severity: "high"
        - error: "Wie kann isch Ihnen helfen? (isch instead of ich)"
          explanation_en: "Regional dialect — in standard professional German, 'ich' uses the palatal /ç/, not /ʃ/."
          explanation_darija: "لهجة جهوية — ف الألمانية المعيارية المهنية، 'ich' كتستعمل /ç/، ماشي /ʃ/."
          severity: "medium"
      srs_config:
        initial_interval_hours: 12
        initial_ease_factor: 2.5
        review_exercise_types: ["repeat", "conversation", "time_pressure"]
        context_variations:
          - "Wie kann ich Ihnen behilflich sein?"
          - "Was kann ich für Sie tun?"
          - "Wie kann ich Ihnen weiterhelfen?"
          - "Womit kann ich Ihnen heute helfen?"

    - id: "v_selbstverstaendlich"
      chunk_phrase: "Selbstverständlich"
      literal_meaning: "Self-evidently / Of course"
      functional_meaning: >
        Professional affirmation. Communicates: "Of course I will help you. 
        Your request is reasonable and I am happy to assist." Much stronger 
        and more professional than just "Ja."
      translation_en: "Of course / Certainly / Absolutely"
      translation_darija: "طبعا / بكل تأكيد (بشكل احترافي بزاف)"
      translation_fr: "Bien entendu / Évidemment"
      ipa: "/ˌzɛlpstfɛɐ̯ˈʃtɛntlɪç/"
      audio_native: "audio/missions/m01_001_d/vocab_selbstverstaendlich_native.opus"
      audio_slow: "audio/missions/m01_001_d/vocab_selbstverstaendlich_slow.opus"
      part_of_speech: "affirmation_adverb"
      article: null
      register: "formal"
      frequency_rank: 8
      domain: "affirmation"
      cluster: "affirmers"
      example_in_context:
        de: "Selbstverständlich helfe ich Ihnen gerne."
        en: "Of course, I'm happy to help you."
        darija: "طبعا، بكل سرور غنعاونك."
        audio: "audio/missions/m01_001_d/example_selbstverstaendlich.opus"
      phonetic_bridge:
        language: "none"
        bridge_text_en: >
          No direct bridge — this is a distinctively German word. But break it 
          into parts: SELBST (self) + ver-STÄND-lich (understandable). 
          It literally means "self-understandably" = "it goes without saying."
        bridge_text_darija: >
          ما كاينش equivalent مباشر — هادي كلمة ألمانية خاصة. ولكن قسمها: 
          SELBST (ذات) + ver-STÄND-lich (مفهوم). يعني حرفيا "مفهوم من ذاته" 
          = "بلا ما تسأل."
      pronunciation_guide:
        stress_pattern: "SELBST-ver-STÄND-lich (4 syllables)"
        key_sounds:
          - sound: "Initial 'S' = /z/ (voiced)"
            tip_en: "German 'S' before a vowel is always /z/ (like English 'z' in 'zoo')"
            tip_darija: "'S' الألمانية قبل voyelle ديما /z/ (بحال 'z' ف 'zoo')"
          - sound: "'st' within word = /st/ (not /ʃt/)"
            tip_en: "The sp/st → /ʃp//ʃt/ rule ONLY applies at word START. Here it's /st/."
            tip_darija: "قاعدة sp/st → /ʃp//ʃt/ كتطبق غير ف بداية الكلمة. هنا /st/."
          - sound: "'-lich' ending = /lɪç/"
            tip_en: "The 'ch' here is the ich-Laut /ç/ (front, not back)"
            tip_darija: "'ch' هنا هي ich-Laut /ç/ (من قدام، ماشي من لور)"
        intonation: "Confident, level tone. Not a question. A professional statement of willingness."
      common_errors:
        - error: "Selbstverständlisch (adding 'sch' sound)"
          explanation_en: "'-lich' ends with /ç/ (the ich-sound), not /ʃ/ (sch-sound). Common error."
          explanation_darija: "'-lich' كتسالي ب /ç/ (صوت ich)، ماشي /ʃ/ (صوت sch). خطأ شائع."
          severity: "medium"
        - error: "Emphasizing wrong syllable: selbstverSTÄNDlich"
          explanation_en: "Primary stress is on STÄND, but SELBST also carries stress. Both syllables 1 and 3 are stressed."
          explanation_darija: "النبرة الرئيسية على STÄND، ولكن SELBST عندها نبرة حتى هي. المقطع 1 و 3 عندهم نبرة."
          severity: "low"
      srs_config:
        initial_interval_hours: 24
        initial_ease_factor: 2.5
        review_exercise_types: ["repeat", "conversation"]
        context_variations:
          - "Selbstverständlich, das mache ich sofort für Sie."
          - "Selbstverständlich, Frau Schmidt. Einen Moment bitte."
          - "Selbstverständlich helfe ich Ihnen gerne weiter."
          - "Selbstverständlich. Können Sie mir bitte Ihre Kundennummer geben?"

    - id: "v_einen_moment_bitte"
      chunk_phrase: "Einen Moment bitte"
      literal_meaning: "One moment please"
      functional_meaning: >
        Professional time-buyer. Used when you need a few seconds to look 
        something up, think, or navigate a system. Fills silence professionally 
        instead of leaving the customer wondering if you're still there.
      translation_en: "One moment please"
      translation_darija: "لحظة عافاك"
      translation_fr: "Un instant, s'il vous plaît"
      ipa: "/ˈaɪnən moˈmɛnt ˈbɪtə/"
      audio_native: "audio/missions/m01_001_d/vocab_einen_moment_native.opus"
      audio_slow: "audio/missions/m01_001_d/vocab_einen_moment_slow.opus"
      part_of_speech: "bridge_phrase"
      article: null
      register: "formal"
      frequency_rank: 4
      domain: "call_management"
      cluster: "bridges"
      example_in_context:
        de: "Einen Moment bitte, ich schaue in unserem System nach."
        en: "One moment please, I'll look it up in our system."
        darija: "لحظة عافاك، غنشوف ف السيستيم ديالنا."
        audio: "audio/missions/m01_001_d/example_einen_moment.opus"
      phonetic_bridge:
        language: "french"
        bridge_text_en: >
          'Moment' is almost identical to French 'moment'. Same word, same 
          meaning, nearly same pronunciation (just stress the second syllable 
          more in German: mo-MENT).
        bridge_text_darija: >
          'Moment' تقريبا نفس الكلمة بالفرنسية 'moment'. نفس المعنى، تقريبا 
          نفس النطق (غير ركز على المقطع الثاني أكثر بالألمانية: mo-MENT).
      pronunciation_guide:
        stress_pattern: "EI-nen mo-MENT BIT-te"
        key_sounds:
          - sound: "'Einen' — the 'ei' = /aɪ/"
            tip_en: "German 'ei' always = 'eye'. So 'Einen' = EYE-nen."
            tip_darija: "'ei' الألمانية ديما = صوت 'eye'. يعني 'Einen' = آي-نن."
          - sound: "'bitte' — short 'i' /ɪ/ + double 't'"
            tip_en: "Short, crisp 'i' (like English 'bit'), sharp 'tt', then schwa."
            tip_darija: "'i' قصيرة وحادة (بحال 'bit' بالانجليزية)، 'tt' حادة، وبعدها schwa."
        intonation: "Polite, slightly rising. Not demanding — requesting."
      common_errors:
        - error: "Ein Moment bitte (missing 'en' ending)"
          explanation_en: "'Einen' is accusative (direct object). The accusative 'en' ending is required here. This is embedded grammar — don't worry about why, just learn the full phrase."
          explanation_darija: "'Einen' هو Akkusativ. نهاية '-en' ضرورية هنا. هادي grammaire مدمجة — ما تقلقش علاش، غير تعلم العبارة كاملة."
          severity: "low"
      srs_config:
        initial_interval_hours: 12
        initial_ease_factor: 2.5
        review_exercise_types: ["repeat", "conversation", "time_pressure"]
        context_variations:
          - "Einen Moment bitte, ich prüfe das für Sie."
          - "Einen kleinen Moment, ich verbinde Sie."
          - "Einen Moment, ich schaue sofort nach."
          - "Einen Moment bitte, ich notiere mir das."

  supporting:
    - id: "v_vielen_dank"
      chunk_phrase: "Vielen Dank"
      functional_meaning: "Professional thank-you. Stronger than just 'Danke'."
      translation_en: "Thank you very much"
      translation_darija: "شكرا بزاف"
      translation_fr: "Merci beaucoup"
      ipa: "/ˈfiːlən daŋk/"
      audio_native: "audio/missions/m01_001_d/vocab_vielen_dank_native.opus"
      audio_slow: "audio/missions/m01_001_d/vocab_vielen_dank_slow.opus"
      register: "formal"
      cluster: "closers"
      pronunciation_guide:
        key_sounds:
          - sound: "'V' in 'Vielen' = /f/"
            tip_en: "German 'v' in German-origin words is /f/. Vielen = FEE-len."
            tip_darija: "'v' الألمانية ف الكلمات الألمانية = /f/. Vielen = فيي-لن."
      srs_config:
        initial_interval_hours: 24
        initial_ease_factor: 2.5
        review_exercise_types: ["repeat", "conversation"]
        context_variations:
          - "Vielen Dank für Ihre Geduld."
          - "Vielen Dank, Frau Schmidt."
          - "Vielen Dank für Ihren Anruf."

  review: []


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 7: DIALOGUE
# ─────────────────────────────────────────────────────────────────────────────
dialogue:
  id: "dlg_m01_001"
  context: "First customer call — Frau Schmidt has a question about her order"
  total_turns: 8
  estimated_duration_seconds: 120

  turns:
    - turn: 1
      speaker: "system"
      type: "narration"
      text_en: >
        Your headset beeps twice. The screen shows: "Incoming — Frau Schmidt, 
        Stammkundin." The green answer button pulses. This is it.
      text_darija: >
        الكاسك ديالك صوّن مرتين. الشاشة كتبين: "مكالمة واردة — مدام شميت، 
        زبونة دائمة." الزر الأخضر كيوض. هادي هي.
      audio_path: "audio/missions/m01_001_d/dlg_phone_ring.opus"

    - turn: 2
      speaker: "agent"
      type: "production"
      text_de: "Guten Tag, TeleService GmbH, mein Name ist Youssef, wie kann ich Ihnen helfen?"
      text_de_slow: "Guten Tag... TeleService GmbH... mein Name ist Youssef... wie kann ich Ihnen helfen?"
      audio_path_native: "audio/missions/m01_001_d/dlg_t2_native.opus"
      audio_path_slow: "audio/missions/m01_001_d/dlg_t2_slow.opus"
      audio_path_shadow: "audio/missions/m01_001_d/dlg_t2_shadow.opus"
      translation_en: "Good day, TeleService GmbH, my name is Youssef, how can I help you?"
      translation_darija: "نهار مبروك، تيلي سيرفيس، سميتي يوسف، كيفاش نقدر نعاونكم؟"
      translation_fr: "Bonjour, TeleService GmbH, mon nom est Youssef, comment puis-je vous aider ?"
      pronunciation_notes:
        - segment: "Guten Tag"
          note: "GU-ten TAG. Slight fall on 'Tag'. Confident, not tentative."
        - segment: "mein Name"
          note: "'Mein' rhymes with English 'mine'. 'Name' = NAH-muh."
        - segment: "wie kann ich Ihnen helfen?"
          note: "'wie' starts with /v/ not /w/. Clear RISE on 'helfen?' — it's a question."
      acceptable_responses:
        - pattern: "Guten Tag"
          required: true
          weight: 0.20
          alternatives: ["Guten Morgen", "Guten Abend"]
        - pattern: "TeleService"
          required: false
          weight: 0.10
        - pattern: "Name"
          required: false
          weight: 0.15
          alternatives: ["mein Name ist", "ich bin"]
        - pattern: "wie kann ich"
          required: true
          weight: 0.25
          alternatives: ["was kann ich für Sie"]
        - pattern: "helfen"
          required: true
          weight: 0.30
          alternatives: ["tun", "behilflich"]
      scaffolding:
        support_high:
          description: "Full German text visible on screen. Native audio model plays first. Learner repeats."
          text_visible: true
          audio_model_first: true
          word_bank: null
          hint_available: true
          hint_text: "Greeting + Company + Name + How can I help?"
        support_standard:
          description: "First word of each segment visible as memory prompts."
          text_visible: false
          first_words_visible: true
          first_words: ["Guten...", "TeleService...", "mein...", "wie..."]
          audio_model_first: false
          word_bank: null
          hint_available: true
          hint_text: "Start with Guten Tag, then company, then your name, then offer help."
        support_minimal:
          description: "Situational prompt only. No German text. Produce from memory."
          text_visible: false
          first_words_visible: false
          audio_model_first: false
          word_bank: null
          hint_available: false
      voice_actor_notes: "Agent (learner's own voice — evaluated by system)"

    - turn: 3
      speaker: "frau_schmidt"
      type: "input"
      text_de: "Oh, guten Tag! Hier ist Schmidt, Ingrid Schmidt. Ich habe eine Frage zu meiner Bestellung."
      audio_path_native: "audio/missions/m01_001_d/dlg_t3_native.opus"
      audio_path_slow: "audio/missions/m01_001_d/dlg_t3_slow.opus"
      translation_en: "Oh, good day! This is Schmidt, Ingrid Schmidt. I have a question about my order."
      translation_darija: "آه، نهار مبروك! أنا شميت، انغريد شميت. عندي سؤال على الكوموند ديالي."
      translation_fr: "Oh, bonjour ! Ici Schmidt, Ingrid Schmidt. J'ai une question concernant ma commande."
      comprehension_check:
        type: "multiple_choice"
        question_en: "What does Frau Schmidt need?"
        question_darija: "شنو بغات مدام شميت؟"
        options:
          - text_en: "She has a question about her order"
            text_darija: "عندها سؤال على الكوموند ديالها"
            correct: true
          - text_en: "She wants to complain about a product"
            text_darija: "بغات تشتكي على منتوج"
            correct: false
          - text_en: "She wants to cancel her subscription"
            text_darija: "بغات تلغي الاشتراك ديالها"
            correct: false
      voice_actor_notes: >
        Frau Schmidt voice: Elderly woman (65+), warm, slightly slow, clear 
        articulation. She's a friendly regular customer. Slight smile in 
        the voice. Not in a hurry.

    - turn: 4
      speaker: "agent"
      type: "production"
      text_de: "Selbstverständlich, Frau Schmidt. Können Sie mir bitte Ihre Bestellnummer nennen?"
      text_de_slow: "Selbstverständlich... Frau Schmidt... Können Sie mir bitte... Ihre Bestellnummer nennen?"
      audio_path_native: "audio/missions/m01_001_d/dlg_t4_native.opus"
      audio_path_slow: "audio/missions/m01_001_d/dlg_t4_slow.opus"
      audio_path_shadow: "audio/missions/m01_001_d/dlg_t4_shadow.opus"
      translation_en: "Of course, Mrs. Schmidt. Could you please give me your order number?"
      translation_darija: "طبعا، مدام شميت. تقدري تعطيني رقم الكوموند ديالك عافاك؟"
      translation_fr: "Bien entendu, Madame Schmidt. Pourriez-vous me donner votre numéro de commande ?"
      pronunciation_notes:
        - segment: "Selbstverständlich"
          note: "SELBST-ver-STÄND-lich. Four beats. Confident, not rushed."
        - segment: "Bestellnummer"
          note: "be-STELL-num-mer. Compound word. Natural stress on STELL."
        - segment: "nennen"
          note: "NEN-nen. Short 'e'. Double 'n' means the vowel is SHORT."
      acceptable_responses:
        - pattern: "Selbstverständlich"
          required: false
          weight: 0.20
          alternatives: ["natürlich", "gerne", "kein Problem"]
        - pattern: "Frau Schmidt"
          required: false
          weight: 0.10
        - pattern: "Bestellnummer"
          required: true
          weight: 0.35
          alternatives: ["Bestellung", "Nummer", "Auftragsnummer"]
        - pattern: "bitte"
          required: false
          weight: 0.15
        - pattern: "können"
          required: false
          weight: 0.20
          alternatives: ["können Sie", "hätten Sie", "geben Sie"]
      scaffolding:
        support_high:
          text_visible: true
          audio_model_first: true
          hint_available: true
          hint_text: "Confirm you'll help + Ask for the order number politely"
        support_standard:
          text_visible: false
          first_words_visible: true
          first_words: ["Selbst...", "Können..."]
          audio_model_first: false
          hint_available: true
          hint_text: "Say 'of course' + ask for order number"
        support_minimal:
          text_visible: false
          first_words_visible: false
          audio_model_first: false
          hint_available: false

    - turn: 5
      speaker: "frau_schmidt"
      type: "input"
      text_de: "Ja, natürlich. Einen Moment... Die Nummer ist 4-7-3-8-2."
      audio_path_native: "audio/missions/m01_001_d/dlg_t5_native.opus"
      audio_path_slow: "audio/missions/m01_001_d/dlg_t5_slow.opus"
      translation_en: "Yes, of course. One moment... The number is 4-7-3-8-2."
      translation_darija: "آه طبعا. لحظة... الرقم هو 4-7-3-8-2."
      comprehension_check:
        type: "dictation"
        question_en: "Type the order number you heard."
        question_darija: "كتب رقم الطلب اللي سمعتي."
        expected_answer: "47382"
        allow_variants: ["4 7 3 8 2", "4-7-3-8-2", "47 38 2"]
      voice_actor_notes: >
        Frau Schmidt takes a moment (sound of shuffling papers) before 
        reading the number. She reads each digit clearly with slight 
        pauses between them: "vier... sieben... drei... acht... zwei."

    - turn: 6
      speaker: "agent"
      type: "production"
      text_de: "Vielen Dank, Frau Schmidt. Einen Moment bitte, ich schaue in unserem System nach."
      text_de_slow: "Vielen Dank... Frau Schmidt... Einen Moment bitte... ich schaue in unserem System nach."
      audio_path_native: "audio/missions/m01_001_d/dlg_t6_native.opus"
      audio_path_slow: "audio/missions/m01_001_d/dlg_t6_slow.opus"
      audio_path_shadow: "audio/missions/m01_001_d/dlg_t6_shadow.opus"
      translation_en: "Thank you very much, Mrs. Schmidt. One moment please, I'll look it up in our system."
      translation_darija: "شكرا بزاف، مدام شميت. لحظة عافاك، غنشوف ف السيستيم ديالنا."
      translation_fr: "Merci beaucoup, Madame Schmidt. Un instant s'il vous plaît, je consulte notre système."
      pronunciation_notes:
        - segment: "Vielen Dank"
          note: "'Vielen' — the 'V' = /f/! FEE-len Dank. Not 'vee-len'."
        - segment: "ich schaue nach"
          note: "'schaue' = SHOW-uh. 'nach' — the 'ch' = /x/ (the Arabic خ sound!)."
      acceptable_responses:
        - pattern: "Dank"
          required: true
          weight: 0.20
          alternatives: ["danke", "Vielen Dank"]
        - pattern: "Moment"
          required: true
          weight: 0.30
          alternatives: ["Augenblick", "Sekunde"]
        - pattern: "schaue"
          required: false
          weight: 0.25
          alternatives: ["prüfe", "nachschaue", "checke"]
        - pattern: "bitte"
          required: false
          weight: 0.10
        - pattern: "Frau Schmidt"
          required: false
          weight: 0.15
      scaffolding:
        support_high:
          text_visible: true
          audio_model_first: true
          hint_available: true
          hint_text: "Thank + Name + Ask for a moment + Say what you're doing"
        support_standard:
          text_visible: false
          first_words_visible: true
          first_words: ["Vielen...", "Einen...", "ich..."]
          audio_model_first: false
          hint_available: true
          hint_text: "Thank her, ask for a moment, tell her you're checking"
        support_minimal:
          text_visible: false
          first_words_visible: false
          audio_model_first: false
          hint_available: false

    - turn: 7
      speaker: "frau_schmidt"
      type: "input"
      text_de: "Ja, kein Problem. Ich warte."
      audio_path_native: "audio/missions/m01_001_d/dlg_t7_native.opus"
      audio_path_slow: "audio/missions/m01_001_d/dlg_t7_slow.opus"
      translation_en: "Yes, no problem. I'll wait."
      translation_darija: "آه، ما كاين مشكل. غنتسنا."
      comprehension_check: null
      voice_actor_notes: "Brief, warm, patient. She's comfortable waiting."

    - turn: 8
      speaker: "system"
      type: "narration"
      text_en: >
        Frau Schmidt is waiting patiently. You handled the opening perfectly. 
        The call continues — but that's for tomorrow's mission. 
        For now: you just completed your first professional call in German.
      text_darija: >
        مدام شميت كتسنا بصبر. التعامل ديالك مع البداية كان ممتاز.
        المكالمة كتكمل — ولكن هادشي ديال مهمة غدا.
        دابا: كملتي أول مكالمة احترافية ديالك بالألمانية.
      audio_path: null


# ─────────────────────────────────────────────────────────────────────────────
# SECTION 8: EXERCISES
# ─────────────────────────────────────────────────────────────────────────────
exercises:
  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE: IGNITE (Warm-up — 2.5 minutes)
  # Purpose: Activate "German mode." Build confidence with achievable success.
  # ═══════════════════════════════════════════════════════════════════════════

  - id: "ex_001_01"
    type: "listen_comprehend"
    order: 1
    phase: "ignite"
    estimated_duration_seconds: 45
    prompt_text_en: "Listen to this professional phone greeting. Notice the four parts."
    prompt_text_darija: "سمع هاد التحية المهنية ف التيليفون. لاحظ الأربع أجزاء."
    target_text_de: "Guten Tag, TeleService GmbH, mein Name ist Anna Becker, wie kann ich Ihnen helfen?"
    target_audio_native: "audio/missions/m01_001_d/ex01_full_greeting_native.opus"
    target_audio_slow: "audio/missions/m01_001_d/ex01_full_greeting_slow.opus"
    evaluation_mode: "comprehension_check"
    evaluation_config:
      question_en: "How many parts did the greeting have?"
      question_darija: "شحال من جزء كان عند التحية؟"
      options:
        - text_en: "Four: greeting + company + name + offer to help"
          text_darija: "ربعة: تحية + شركة + اسم + عرض مساعدة"
          correct: true
        - text_en: "Two: hello + name"
          text_darija: "جوج: سلام + اسم"
          correct: false
        - text_en: "One: just a greeting"
          text_darija: "واحد: غير تحية"
          correct: false
    scaffolding:
      support_high: { text_visible: true, audio_model_first: true }
      support_standard: { text_visible: false, audio_model_first: true }
      support_minimal: { text_visible: false, audio_model_first: true }
    feedback:
      on_success: "Exactly. Four parts. That's the German call center formula. You'll own it by the end of this mission."
      on_success_darija: "بالضبط. ربع أجزاء. هادي هي الصيغة ديال call center الألماني. غتوليها ديالك قبل ما تسالي هاد المهمة."
      on_partial: "Listen again — there are four distinct parts: greeting, company, name, and the offer."
      on_retry: "The formula is: [Guten Tag] + [Company name] + [My name is...] + [How can I help?]"
    max_attempts: 2
    time_limit_seconds: null
    vocabulary_ids: []
    srs_trigger: false

  - id: "ex_001_02"
    type: "shadow"
    order: 2
    phase: "ignite"
    estimated_duration_seconds: 40
    prompt_text_en: "Part 1 of the formula. Listen and repeat: the greeting."
    prompt_text_darija: "الجزء 1 من الصيغة. سمع وعاود: التحية."
    target_text_de: "Guten Tag"
    target_audio_native: "audio/missions/m01_001_d/vocab_guten_tag_native.opus"
    target_audio_slow: "audio/missions/m01_001_d/vocab_guten_tag_slow.opus"
    evaluation_mode: "pronunciation_match"
    evaluation_config:
      minimum_score: 0.40
      keywords_required: ["Guten", "Tag"]
      keywords_optional: []
      pronunciation_weight: 0.7
      completeness_weight: 0.3
    scaffolding:
      support_high: { text_visible: true, audio_model_first: true, hint_available: true }
      support_standard: { text_visible: true, audio_model_first: true, hint_available: false }
      support_minimal: { text_visible: false, audio_model_first: true, hint_available: false }
    feedback:
      on_success: "That's your professional hello. Clean and confident."
      on_partial: "Close! The 'T' in Tag is strong. Try with more confidence."
      on_retry: "Listen once more. GU-ten TAG. Two beats, slight fall on 'Tag'."
    max_attempts: 3
    time_limit_seconds: null
    vocabulary_ids: ["v_guten_tag"]
    srs_trigger: true

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE: EQUIP (New material — 8 minutes)
  # Purpose: Teach the five core vocabulary chunks needed for this mission.
  # ═══════════════════════════════════════════════════════════════════════════

  - id: "ex_001_03"
    type: "shadow"
    order: 3
    phase: "equip"
    estimated_duration_seconds: 50
    prompt_text_en: "Part 3 of the formula. Your identification. Listen and repeat."
    prompt_text_darija: "الجزء 3 من الصيغة. التعريف بالنفس. سمع وعاود."
    target_text_de: "Mein Name ist Youssef"
    target_audio_native: "audio/missions/m01_001_d/vocab_mein_name_native.opus"
    target_audio_slow: "audio/missions/m01_001_d/vocab_mein_name_slow.opus"
    evaluation_mode: "pronunciation_match"
    evaluation_config:
      minimum_score: 0.40
      keywords_required: ["Name"]
      keywords_optional: ["Mein", "ist"]
      pronunciation_weight: 0.6
      completeness_weight: 0.4
    scaffolding:
      support_high: { text_visible: true, audio_model_first: true, hint_available: true }
      support_standard: { text_visible: true, audio_model_first: true, hint_available: false }
      support_minimal: { text_visible: false, audio_model_first: true, hint_available: false }
    feedback:
      on_success: "Professional identification. On the phone, this replaces 'I'm Youssef.'"
      on_partial: "'Mein' rhymes with English 'mine'. MINE Nah-muh ist..."
      on_retry: "Break it: MEIN... NAH-muh... ist... [your name]. Simple pieces."
    max_attempts: 3
    time_limit_seconds: null
    vocabulary_ids: ["v_mein_name_ist"]
    srs_trigger: true

  - id: "ex_001_04"
    type: "shadow"
    order: 4
    phase: "equip"
    estimated_duration_seconds: 60
    prompt_text_en: "Part 4 — the most important part. The offer to help."
    prompt_text_darija: "الجزء 4 — الجزء الأهم. عرض المساعدة."
    target_text_de: "Wie kann ich Ihnen helfen?"
    target_audio_native: "audio/missions/m01_001_d/vocab_wie_kann_ich_native.opus"
    target_audio_slow: "audio/missions/m01_001_d/vocab_wie_kann_ich_slow.opus"
    evaluation_mode: "pronunciation_match"
    evaluation_config:
      minimum_score: 0.40
      keywords_required: ["kann", "helfen"]
      keywords_optional: ["Wie", "ich", "Ihnen"]
      pronunciation_weight: 0.6
      completeness_weight: 0.4
    scaffolding:
      support_high: { text_visible: true, audio_model_first: true, hint_available: true }
      support_standard: { text_visible: true, audio_model_first: false, hint_available: true }
      support_minimal: { text_visible: false, audio_model_first: false, hint_available: false }
    feedback:
      on_success: "That's the core. You'll say this 50 times a day at work. And now you can."
      on_success_darija: "هادي هي الأساس. غتقولها 50 مرة ف النهار ف الخدمة. ودابا تقدر."
      on_partial: "Almost! Remember: RISE at the end — it's a question. '...helfen? ↗'"
      on_retry: "Two halves: 'Wie kann ich' [pause] 'Ihnen helfen?' Try each half separately."
    max_attempts: 3
    time_limit_seconds: null
    vocabulary_ids: ["v_wie_kann_ich_ihnen_helfen"]
    srs_trigger: true

  - id: "ex_001_05"
    type: "reconstruct"
    order: 5
    phase: "equip"
    estimated_duration_seconds: 75
    prompt_text_en: "Now — the full formula. All four parts together. Listen, then produce."
    prompt_text_darija: "دابا — الصيغة كاملة. الأجزاء الأربعة مع بعض. سمع، وبعدها نطق."
    target_text_de: "Guten Tag, TeleService GmbH, mein Name ist Youssef, wie kann ich Ihnen helfen?"
    target_audio_native: "audio/missions/m01_001_d/dlg_t2_native.opus"
    target_audio_slow: "audio/missions/m01_001_d/dlg_t2_slow.opus"
    evaluation_mode: "pronunciation_match"
    evaluation_config:
      minimum_score: 0.40
      keywords_required: ["Guten", "Tag", "Name", "helfen"]
      keywords_optional: ["TeleService", "kann", "ich", "Ihnen", "Mein"]
      pronunciation_weight: 0.4
      completeness_weight: 0.6
    scaffolding:
      support_high: { text_visible: true, audio_model_first: true, hint_available: true }
      support_standard: { text_visible: false, audio_model_first: true, hint_available: true, hint_text: "Guten Tag + Company + Name + How can I help?" }
      support_minimal: { text_visible: false, audio_model_first: false, hint_available: false }
    feedback:
